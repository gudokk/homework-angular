<section class="blog">
  <div class="blog-container">
    <div class="blog-header">
      <div>
        <h2>Мой блог</h2>
        <p class="blog-description">
          Что то на латыне тут должно быть.
        </p>
      </div>

      <div class="blog-circle">
        <span>МОЙ БЛОГ МОЙ БЛОГ МОЙ БЛОГ</span>
      </div>
    </div>

    <app-blog-list [posts]="posts" (deletePost)="onDeletePost($event)">
    </app-blog-list>

    <div class="blog-button">
      <button>Next →</button>
    </div>

    <app-admin-panel [postsCount]="posts.length" (addPost)="onAddPost($event)"></app-admin-panel>
  </div>
</section>
