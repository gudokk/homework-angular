<div class="blog-grid">

  @for (post of posts; track post.id) {
    <article class="blog-card post-item" [routerLink]="['/blog', post.id]">
      <div
        class="blog-image small"
        [class.blog-image--empty]="!post.imageUrl"
      >
        @if (post.imageUrl) {
          <img [src]="post.imageUrl" alt="">
        }
      </div>
      <h4>{{ post.title }}</h4>
      <p>{{ post.text }}</p>

        <button
        type="button"
        class="post-delete-button"
        (click)="removePost($event, post.id)"
        mat-icon-button
        aria-label="Удалить статью"
        >
        <mat-icon>delete</mat-icon>
        </button>
        <button
        type="button"
        class="post-edit-button"
        (click)="onEditPost($event, post)"
        mat-icon-button
        aria-label="Редактировать статью"
        >
        <mat-icon>edit</mat-icon>
        </button>
    </article>
  } @empty {
    <div class="blog-empty">
      Пока нет статей
    </div>
  }

</div>
