<section class="posts">
  <div class="posts-container">
    @for (post of posts(); track post.id; let index = $index) {
      <article class="post-card" [routerLink]="['/blog', post.id]">
        <div class="post-content" [class.post-content--beige]="index % 2 === 0" [class.post-content--green]="index % 2 === 1">
          <span class="post-category" [class.post-category--orange]="index % 2 === 0" [class.post-category--green]="index % 2 === 1">
            {{ post.categoryName || 'Без категории' }}
          </span>
          <h3>{{ post.title }}</h3>
          <p>{{ post.text }}</p>
        </div>

        <div class="post-image">
          @if (post.imageUrl) {
            <img [src]="post.imageUrl" alt="">
          }
        </div>
      </article>
    }

    <div class="posts-button">
      <a routerLink="/blog">Browse all posts</a>
    </div>
  </div>
</section>
