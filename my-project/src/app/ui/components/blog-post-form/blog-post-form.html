<div class="blog-post-content">
  <section class="blog-form-section">
    <div class="blog-form-card">
      <h3 class="blog-form-title">
        {{ formTitle() }}
      </h3>

      <form class="blog-form" [formGroup]="postForm" (ngSubmit)="onSave()">
        <div class="blog-form-group">
          <label>
            Заголовок
            <input
              type="text"
              formControlName="title"
              [class.blog-form-field--invalid]="hasError('title')"
            >
          </label>

          @if (hasError('title')) {
            <div class="blog-form-error">
              @for (errorMsg of getControlErrors('title'); track $index) {
                <span>{{ errorMsg }}</span>
              }
            </div>
          }
        </div>

        <div class="blog-form-group">
          <label>
            Текст
            <textarea
              formControlName="text"
              [class.blog-form-field--invalid]="hasError('text')"
            ></textarea>
          </label>

          @if (hasError('text')) {
            <div class="blog-form-error">
              @for (errorMsg of getControlErrors('text'); track $index) {
                <span>{{ errorMsg }}</span>
              }
            </div>
          }
        </div>

        <div class="blog-form-actions">
          <button
            class="blog-form-button blog-form-button--save"
            type="submit"
            [disabled]="postForm.invalid"
          >
            {{ saveButtonTitle() }}
          </button>

          <button
            class="blog-form-button blog-form-button--cancel"
            type="button"
            (click)="onCancel()"
          >
            Отмена
          </button>
        </div>
      </form>
    </div>
  </section>
</div>
