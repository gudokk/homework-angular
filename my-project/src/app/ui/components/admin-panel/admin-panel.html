<div class="blog-admin-layout">
  <aside class="blog-admin-panel">
    <button
      (click)="openPostForm()"
      class="blog-admin-icon-button"
      type="button"
      title="Создать статью"
    >
      <img src="assets/Vector.svg" alt="">
    </button>

    <button
      (click)="openStats()"
      class="blog-admin-icon-button"
      type="button"
      title="Показать статистику"
    >
      <img src="assets/stats.svg" alt="">
    </button>
  </aside>
</div>
