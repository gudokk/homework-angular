<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Блог</title>

  <link rel="icon" type="svg" href="icons/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <header class="header">
  <div class="header-container">

    <div class="Blog-name">
      Машин-блог
    </div>

    <nav>
      <ul class="menu">
        <li><a href="index.html">Главная</a></li>
        <li><a href="blog.html" aria-current="page">Блог</a></li>
        <li><a href="#contacts">Контакты</a></li>
      </ul>
    </nav>

  </div>
</header>

  <main>
    <section class="blog">
      <div class="blog-container">

        <div class="blog-header">
          <div>
            <h2>Мой блог</h2>
            <p class="blog-description">
              Что то на латыне тут должно быть.
            </p>
          </div>

          <div class="blog-circle">
            <span>МОЙ БЛОГ МОЙ БЛОГ МОЙ БЛОГ</span>
          </div>
        </div>
        <div class="blog-grid" id="blog-grid">
          <div class="blog-empty" id="blog-empty">
            Пока нет статей
          </div>
        </div>

        <div class="blog-button">
          <button>Next →</button>
        </div>


    <div class="blog-admin-layout">
      <aside class="blog-admin-panel">
        <button
          class="blog-admin-icon-button"
          id="open-post-form"
          type="button"
          title="Создать статью"
        >
          <img src="icons/Vector.svg" alt="">
        </button>

        <button
          class="blog-admin-icon-button"
          id="open-stats"
          type="button"
          title="Показать статистику"
        >
          <img src="icons/stats.svg" alt="">
        </button>
      </aside>

      <div class="blog-admin-content">
        <section
          class="blog-form-section"
          id="blog-form-section"
          aria-hidden="true"
        >
          <div class="blog-form-card">
            <h3 class="blog-form-title">Добавить статью</h3>

            <form class="blog-form" id="blog-form">
              <div class="blog-form-group">
                <label for="post-title">Заголовок</label>
                <input
                  id="post-title"
                  name="title"
                  type="text"
                  placeholder="Заголовок статьи"
                  required
                >
              </div>

              <div class="blog-form-group">
                <label for="post-text">Текст статьи</label>
                <textarea
                  id="post-text"
                  name="text"
                  placeholder="Текст статьи"
                  rows="7"
                  required
                ></textarea>
              </div>

              <div class="blog-form-actions">
                <button class="blog-form-button blog-form-button--save" type="submit">
                  Сохранить
                </button>
                <button
                  class="blog-form-button blog-form-button--cancel"
                  id="cancel-post-form"
                  type="button"
                >
                  Отмена
                </button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </div>

    <dialog class="stats-dialog" id="stats-dialog">
      <div class="stats-dialog__content">
        <button
          class="stats-dialog__close"
          id="close-stats"
          type="button"
          aria-label="Закрыть статистику"
        >
          ×
        </button>

        <h3 class="stats-dialog__title">Статистика страницы</h3>
        <p class="stats-dialog__text">
          Количество постов на странице:
        </p>
        <p class="stats-dialog__count" id="posts-count">0</p>
      </div>
    </dialog>
      </div>
    </section>

  </main>

  <footer id="contacts" class="footer">
    <div class="footer-container">
      <div class="footer-left">
        <h2 class="footer-title">Пришлите мне оффер пожалуйста</h2>
        <p>Email: <a href="mailto:alex@creativeblog.ru">alex@creativeblog.ru</a></p>
        <p>Телефон: <a href="tel:+79991234567">+7 (999) 123-45-67</a></p>
      </div>
      
      <div class="footer-right">
        <form class="contact-form">
          <label>Email</label>
          <input 
          type="email" 
          placeholder="Your email"
          required
          >
          <label>Input your message</label>
          <textarea 
          placeholder="Input your message"
          rows="4"
        ></textarea>
          <button type="submit">
            Submit
          </button>
        </form>
      </div>

    </div>
</footer>
<script src="scripts/script.js"></script>
</body>
</html>
